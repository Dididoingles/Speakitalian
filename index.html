<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Italian Roleplay Practice</title>
    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #c20000;
            --primary-hover: #a00000;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --border: #e0e0e0;
            --success: #2e7d32;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .app-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .app-header h1 {
            font-size: 1.5rem;
            color: var(--text-main);
            font-weight: 700;
            margin-bottom: 4px;
        }

        .app-header p {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 6px;
            background-color: var(--border);
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--primary);
            transition: width 0.4s ease;
        }

        /* Chat Area */
        .chat-area {
            padding: 24px;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .bubble {
            max-width: 85%;
            margin-bottom: 20px;
            padding: 16px 20px;
            border-radius: 12px;
            line-height: 1.5;
            position: relative;
            animation: fadeIn 0.3s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Character Bubble */
        .bubble.character {
            background-color: var(--bg);
            border: 1px solid var(--border);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            padding-right: 50px;
            width: 100%;
        }

        .audio-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .audio-btn:hover {
            background-color: rgba(194, 0, 0, 0.1);
        }

        /* Instruction / Script Guide */
        .script-guide {
            background-color: #fff8f8;
            border-left: 4px solid var(--primary);
            padding: 12px 16px;
            border-radius: 4px;
            margin-top: 8px;
            font-size: 0.9rem;
        }

        .script-guide .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 2px;
        }

        .script-guide .target-text {
            font-weight: 500;
            color: var(--text-main);
        }

        .script-guide .translation {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-style: italic;
        }

        /* Controls Area */
        .controls {
            padding: 24px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            background: #fafafa;
        }

        .rec-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: none;
            background-color: var(--primary);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(194, 0, 0, 0.3);
            transition: all 0.2s ease;
            position: relative;
        }

        .rec-btn:hover {
            background-color: var(--primary-hover);
            transform: scale(1.05);
        }

        .rec-btn:disabled {
            background-color: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .rec-btn.listening {
            background-color: #333333;
            box-shadow: 0 0 0 0 rgba(51, 51, 51, 0.7);
            animation: pulse 1.5s infinite cubic-bezier(0.66, 0, 0, 1);
        }

        @keyframes pulse {
            to { box-shadow: 0 0 0 18px rgba(51, 51, 51, 0); }
        }

        .status-text {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
            min-height: 20px;
            text-align: center;
        }

        /* Live Transcript and Feedback */
        .transcript-container {
            width: 100%;
            text-align: center;
            min-height: 48px;
        }

        .transcript-preview {
            font-size: 1rem;
            color: var(--text-main);
            font-weight: 500;
        }

        .feedback-match {
            color: var(--success);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* Toast Notification System */
        .toast-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        .toast {
            background-color: #333333;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            box-shadow: var(--shadow);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Screen States */
        .hidden {
            display: none !important;
        }

        .result-screen {
            padding: 40px 24px;
            text-align: center;
            animation: fadeIn 0.4s ease;
        }

        .result-icon {
            color: var(--success);
            margin-bottom: 16px;
        }

        .btn-restart {
            margin-top: 24px;
            padding: 12px 24px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-restart:hover {
            background-color: var(--primary-hover);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <header class="app-header">
            <h1>Conversazione in Italiano</h1>
            <p>Respond to the speaker out loud</p>
        </header>

        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- Practice Screen -->
        <div id="practiceScreen">
            <div class="chat-area" id="chatArea">
                <!-- Dialogue items dynamically inserted here -->
            </div>

            <!-- Interaction Controls -->
            <div class="controls">
                <div class="transcript-container" id="transcriptContainer">
                    <p class="status-text" id="statusText">Click the microphone to reply</p>
                </div>

                <button class="rec-btn" id="micBtn" aria-label="Record response">
                    <i data-lucide="mic" id="micIcon" width="28" height="28"></i>
                </button>
            </div>
        </div>

        <!-- Completion Screen -->
        <div id="resultScreen" class="result-screen hidden">
            <div class="result-icon">
                <i data-lucide="party-popper" width="64" height="64"></i>
            </div>
            <h2>Excellent job!</h2>
            <p style="color: var(--text-muted); margin-top: 8px;">You have completed the introductory conversation.</p>
            <button class="btn-restart" id="restartBtn">
                <i data-lucide="rotate-ccw" width="18" height="18"></i> Try Again
            </button>
        </div>
    </div>

    <!-- Toast Container for UX notifications -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // Conversation Script Definition
        const conversation = [
            {
                character: "Ciao! Come ti chiami?",
                guide: "Ciao! Mi chiamo [Your name].",
                translation: "Hi! What's your name? / Hi! My name is...",
                validation: /.*(chiamo|sono).*/i 
            },
            {
                character: "Piacere di conoscerti! Di dove sei?",
                guide: "Piacere! Sono di London, in Inghilterra.",
                translation: "Nice to meet you! Where are you from? / Nice to meet you! I'm from London, in England.",
                validation: /.*(sono|di|london|inghilterra).*/i
            },
            {
                character: "Che bello! Come stai oggi?",
                guide: "Sto bene, grazie! E tu?",
                translation: "How lovely! How are you today? / I'm doing well, thank you! And you?",
                validation: /.*(sto|bene|grazie).*/i
            }
        ];

        let currentStep = 0;
        let recognition = null;
        let isListening = false;
        let synthesisVoice = null;

        // DOM Elements
        const chatArea = document.getElementById('chatArea');
        const progressBar = document.getElementById('progressBar');
        const micBtn = document.getElementById('micBtn');
        const micIcon = document.getElementById('micIcon');
        const statusText = document.getElementById('statusText');
        const transcriptContainer = document.getElementById('transcriptContainer');
        const practiceScreen = document.getElementById('practiceScreen');
        const resultScreen = document.getElementById('resultScreen');
        const restartBtn = document.getElementById('restartBtn');
        const toastContainer = document.getElementById('toastContainer');

        // Cria instâncias isoladas e limpas do SpeechRecognition sob demanda
        function createSpeechRecognitionInstance() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return null;

            const instance = new SpeechRecognition();
            instance.lang = 'it-IT';
            instance.interimResults = false;
            instance.maxAlternatives = 1;

            instance.onstart = () => {
                isListening = true;
                micBtn.classList.add('listening');
                statusText.textContent = "Listening... Speak now";
                transcriptContainer.innerHTML = `<p class="status-text">Listening...</p>`;
            };

            instance.onerror = (event) => {
                console.error("Speech Recognition Error:", event.error);
                stopListening();
                if (event.error === 'no-speech') {
                    showToast("No speech detected. Please try again.");
                } else if (event.error === 'not-allowed') {
                    statusText.innerHTML = `<span style="color: var(--primary); font-weight: 600;">Ative o microfone no topo do navegador para praticar.</span>`;
                    showToast("Acesso ao microfone negado ou bloqueado.");
                } else {
                    showToast("Recognition error. Please try again.");
                }
            };

            instance.onend = () => {
                stopListening();
            };

            instance.onresult = (event) => {
                const resultText = event.results[0][0].transcript.trim();
                processAnswer(resultText);
            };

            return instance;
        }

        // Inicializa o motor de voz (synthesis)
        function initSpeechEngine() {
            if (!window.SpeechRecognition && !window.webkitSpeechRecognition) {
                showToast("Speech recognition is not supported on this browser.");
                micBtn.disabled = true;
                return;
            }

            if ('speechSynthesis' in window) {
                const loadVoices = () => {
                    const voices = window.speechSynthesis.getVoices();
                    synthesisVoice = voices.find(voice => voice.lang.startsWith('it'));
                };
                loadVoices();
                window.speechSynthesis.onvoiceschanged = loadVoices;
            }
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'it-IT';
                if (synthesisVoice) utterance.voice = synthesisVoice;
                window.speechSynthesis.speak(utterance);
            }
        }

        function stopListening() {
            isListening = false;
            micBtn.classList.remove('listening');
            statusText.textContent = "Click the microphone to reply";
        }

        // Renderiza a etapa atual e limpa referências antigas
        function renderStep() {
            if (currentStep >= conversation.length) {
                showCompletion();
                return;
            }

            // Reseta qualquer estado de escuta anterior
            isListening = false;
            micBtn.classList.remove('listening');

            // Atualiza a barra de progresso
            const progressPercentage = (currentStep / conversation.length) * 100;
            progressBar.style.width = `${progressPercentage}%`;

            const item = conversation[currentStep];

            chatArea.innerHTML = `
                <div class="bubble character">
                    <p><strong>${item.character}</strong></p>
                    <button class="audio-btn" id="playAudioBtn" aria-label="Listen to pronunciation">
                        <i data-lucide="volume-2" width="18" height="18"></i>
                    </button>
                </div>
                <div class="script-guide">
                    <div class="label">Suggested Response / Guide:</div>
                    <div class="target-text">${item.guide}</div>
                    <div class="translation">${item.translation}</div>
                </div>
            `;
            
            lucide.createIcons();

            document.getElementById('playAudioBtn').addEventListener('click', () => {
                speak(item.character);
            });

            setTimeout(() => {
                speak(item.character);
            }, 400);
        }

        // Avalia a resposta do aluno
        function processAnswer(transcript) {
            const currentItem = conversation[currentStep];
            const cleanTranscript = transcript.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?]/g,"").toLowerCase().trim();

            if (currentItem.validation.test(cleanTranscript) || cleanTranscript.length > 4) {
                transcriptContainer.innerHTML = `
                    <p class="transcript-preview">"${transcript}"</p>
                    <div class="feedback-match">
                        <i data-lucide="check-circle" width="16" height="16"></i> Great! Moving forward...
                    </div>
                `;
                lucide.createIcons();
                
                currentStep++;
                
                setTimeout(() => {
                    renderStep();
                    transcriptContainer.innerHTML = `<p class="status-text">Click the microphone to reply</p>`;
                }, 2000);

            } else {
                transcriptContainer.innerHTML = `
                    <p class="transcript-preview" style="color: var(--primary)">"${transcript}"</p>
                    <p class="status-text" style="color: var(--primary)">I couldn't quite catch that. Try again following the guide!</p>
                `;
                showToast("Response not recognized, please try again.");
            }
        }

        // Sistema de Notificações Toast Interno
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i data-lucide="info" width="16" height="16"></i> <span>${message}</span>`;
            toastContainer.appendChild(toast);
            lucide.createIcons();

            setTimeout(() => toast.classList.add('show'), 10);

            setTimeout(() => {
                toast.classList.remove('show');
                toast.addEventListener('transitionend', () => toast.remove());
            }, 3000);
        }

        function showCompletion() {
            progressBar.style.width = '100%';
            practiceScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');
        }

        // Event Listener do Botão do Microfone com Instanciação On-Demand
        micBtn.addEventListener('click', () => {
            if (isListening) {
                if (recognition) {
                    try { recognition.stop(); } catch(e) {}
                }
                stopListening();
            } else {
                // Cancela qualquer voz pendente do robô antes de começar a ouvir
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                }

                // Cria uma instância limpa no exato momento do clique físico do cliente
                recognition = createSpeechRecognitionInstance();

                if (!recognition) {
                    showToast("Speech recognition não suportado neste navegador.");
                    return;
                }

                try {
                    recognition.start();
                } catch(e) {
                    console.error("Erro crítico na inicialização imediata:", e);
                    // Fallback resiliente caso o navegador trave a pipeline
                    try {
                        recognition.stop();
                        setTimeout(() => { 
                            recognition = createSpeechRecognitionInstance();
                            recognition.start(); 
                        }, 200);
                    } catch(_) {}
                }
            }
        });

        restartBtn.addEventListener('click', () => {
            currentStep = 0;
            resultScreen.classList.add('hidden');
            practiceScreen.classList.remove('hidden');
            transcriptContainer.innerHTML = `<p class="status-text">Click the microphone to reply</p>`;
            renderStep();
        });

        // Inicialização Core da Página
        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            initSpeechEngine();
            renderStep();
        });
    </script>
</body>
</html>
